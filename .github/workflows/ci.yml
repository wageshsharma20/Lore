name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-web:
    name: Build Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/web
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './apps/web/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  test-api:
    name: Test Backend (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          if [ -d "apps/api" ]; then
            cd apps/api
            echo "Waiting for Person A to push requirements.txt"
          else
            echo "apps/api not found yet, skipping."
          fi
      - name: Run Tests
        run: |
          if [ -d "apps/api" ]; then
            cd apps/api
            echo "Waiting for Person A to push tests"
          else
            echo "apps/api not found yet, skipping."
          fi
