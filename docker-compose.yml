# docker-compose.yml
services:
  api:
    build: ./apps/api
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [postgres, redis, neo4j]
    volumes: ["./apps/api:/app"]
    command: uvicorn main:app --reload --host 0.0.0.0

  worker:
    build: ./apps/api
    env_file: .env
    depends_on: [postgres, redis, neo4j]
    command: celery -A tasks worker --loglevel=info

  web:
    build: ./apps/web
    ports: ["3000:3000"]
    env_file: .env

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: lore
      POSTGRES_USER: lore
      POSTGRES_PASSWORD: lorepass
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/neo4j-password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  neo4j_data:
