name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-web:
    name: Build Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/web
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './apps/web/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  test-api:
    name: Test Backend (FastAPI)
    runs-on: ubuntu-latest
    # Assuming API will be pushed to apps/api by Person A
    defaults:
      run:
        working-directory: ./apps/api
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        # Placeholder: Person A hasn't pushed API yet, so we just echo for now
        # so the CI doesn't instantly fail when Person B pushes this.
        run: |
          echo "Waiting for Person A to push requirements.txt"
          # pip install -r requirements.txt
      - name: Run Tests
        run: |
          echo "Waiting for Person A to push tests"
          # python -m pytest tests/ -v
